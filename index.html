<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionnaire de bobines 3D</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><circle cx='24' cy='24' r='20' stroke='%233b82f6' stroke-width='3' fill='none'/><circle cx='24' cy='24' r='8' stroke='%233b82f6' stroke-width='2.5' fill='%233b82f6' fill-opacity='0.2'/><circle cx='24' cy='24' r='3' fill='%233b82f6'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
body{min-height:100vh;background:#0e1015;color:#e0e0e0;font-family:'Space Grotesk','Segoe UI',sans-serif}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── Setup Screen ─── */
.setup-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .4s ease}
.setup-card{background:#14161c;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:40px;max-width:480px;width:100%;text-align:center;animation:slideUp .4s ease}
.setup-logo{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:20px;padding:16px;display:inline-flex;margin-bottom:20px}
.setup-title{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;background:linear-gradient(90deg,#fff,#aaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.setup-sub{font-size:13px;color:#666;margin-bottom:32px}
.setup-section{text-align:left;margin-bottom:20px}
.setup-section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.setup-section p{font-size:13px;color:#777;line-height:1.6;margin-bottom:12px}
.setup-input{width:100%;padding:12px 16px;background:#0e1015;border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#eee;font-size:15px;outline:none;font-family:'Space Mono',monospace;text-align:center;letter-spacing:.1em;transition:border-color .2s}
.setup-input:focus{border-color:#3b82f6}
.setup-input::placeholder{letter-spacing:normal;color:#444}
.setup-btn{width:100%;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 4px 15px rgba(59,130,246,.3);transition:transform .15s,box-shadow .15s;margin-top:8px}
.setup-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.4)}
.setup-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.setup-or{color:#444;font-size:12px;margin:16px 0;font-family:'JetBrains Mono',monospace}
.setup-btn-secondary{width:100%;padding:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#aaa;font-size:14px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:background .15s}
.setup-btn-secondary:hover{background:rgba(255,255,255,.08)}
.setup-error{color:#ef4444;font-size:12px;margin-top:8px;font-family:'JetBrains Mono',monospace}
.setup-step{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.12);border-radius:10px;padding:14px;margin-bottom:12px;text-align:left}
.setup-step code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;font-size:12px;font-family:'JetBrains Mono',monospace;color:#8b9cf6}

/* ─── Sync indicator ─── */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.sync-online{background:#10b981;box-shadow:0 0 6px #10b98166}
.sync-offline{background:#ef4444;animation:pulse 2s infinite}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:#666;font-family:'JetBrains Mono',monospace}
.room-badge{background:rgba(139,92,246,.1);color:#8b5cf6;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;cursor:pointer;border:none}
.room-badge:hover{background:rgba(139,92,246,.2)}

/* ─── Header ─── */
.header{background:linear-gradient(135deg,#12141a,#1a1d25);border-bottom:1px solid rgba(255,255,255,0.05);padding:24px 32px}
.header-inner{max-width:1400px;margin:0 auto}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-icon{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:14px;padding:10px;display:flex}
.logo-title{font-size:22px;font-weight:700;letter-spacing:-.02em;font-family:'JetBrains Mono',monospace;background:linear-gradient(90deg,#fff,#aaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:12px;color:#666;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:10px}
.header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn-add{display:flex;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 4px 15px rgba(59,130,246,.3);transition:transform .15s,box-shadow .15s}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.4)}
.btn-icon{display:flex;align-items:center;justify-content:center;width:40px;height:40px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;color:#888;cursor:pointer;transition:background .15s,color .15s}
.btn-icon:hover{background:rgba(255,255,255,.08);color:#ccc}

/* ─── Stats ─── */
.stats{display:flex;gap:24px;margin-top:20px;flex-wrap:wrap}
.stat-card{background:rgba(255,255,255,.03);border-radius:12px;padding:12px 20px;border:1px solid rgba(255,255,255,.05);min-width:120}
.stat-label{font-size:11px;color:#666;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px}

/* ─── Toolbar ─── */
.toolbar{max-width:1400px;margin:0 auto;padding:20px 32px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1 1 250px;max-width:350px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;display:flex}
.input{width:100%;padding:10px 14px;background:#12141a;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#eee;font-size:14px;outline:none;font-family:'Space Mono',monospace;transition:border-color .2s}
.input:focus,.select:focus,.textarea:focus{border-color:#3b82f6!important}
.input-search{padding-left:38px;background:#14161c}
.select{padding:10px 14px;background:#14161c;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#eee;font-size:14px;outline:none;font-family:'Space Mono',monospace;appearance:none;cursor:pointer;min-width:130px}
.view-toggle{display:flex;gap:4px;background:#14161c;border-radius:10px;padding:3px;border:1px solid rgba(255,255,255,.06)}
.view-btn{background:transparent;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;color:#666;display:flex}
.view-btn.active{background:rgba(59,130,246,.2);color:#3b82f6}

/* ─── Grid ─── */
.content{max-width:1400px;margin:0 auto;padding:0 32px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:#14161c;border-radius:16px;border:1px solid rgba(255,255,255,.05);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s}
.card:hover{transform:translateY(-3px)}
.card-bar{height:5px}
.card-body{padding:18px 20px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start}
.card-info{flex:1;min-width:0}
.card-name-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.color-dot{border-radius:50%;border:2px solid rgba(255,255,255,.15);flex-shrink:0}
.card-name{font-size:15px;font-weight:600;color:#eee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{font-size:12px;color:#777;font-family:'JetBrains Mono',monospace}
.gauge-wrap{position:relative;flex-shrink:0}
.gauge-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#ccc;font-family:'JetBrains Mono',monospace}
.tags{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;font-family:'JetBrains Mono',monospace;text-transform:uppercase}

/* ─── List ─── */
.list{display:flex;flex-direction:column;gap:6px}
.list-row{display:flex;align-items:center;gap:16px;background:#14161c;border-radius:12px;padding:12px 20px;border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s}
.list-row:hover{background:#1a1d25}
.list-name{flex:1;min-width:0}
.list-name span:first-child{font-weight:600;color:#eee;font-size:14px}
.list-name span:last-child{color:#555;margin-left:8px;font-size:12px}
.list-mat{font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600;font-family:'JetBrains Mono',monospace}
.list-dia{color:#666;font-size:12px;font-family:'JetBrains Mono',monospace;min-width:55px;text-align:right}
.progress-wrap{display:flex;align-items:center;gap:8px;min-width:80px;justify-content:flex-end}
.progress-bar{width:60px;height:6px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.progress-pct{font-size:11px;font-weight:700;color:#999;font-family:'JetBrains Mono',monospace;min-width:45px;text-align:right}

/* ─── Empty ─── */
.empty{text-align:center;padding:80px 20px;color:#444}
.empty p{margin-top:16px;font-size:16px;font-family:'JetBrains Mono',monospace}
.empty .sub{font-size:13px;color:#555;margin-top:4px}

/* ─── Modal ─── */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:#1a1d23;border-radius:16px;width:100%;max-width:560px;max-height:85vh;overflow:auto;border:1px solid rgba(255,255,255,.08);box-shadow:0 25px 60px rgba(0,0,0,.5);animation:slideUp .3s ease}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.06)}
.modal-title{font-size:18px;font-weight:700;color:#f0f0f0;font-family:'JetBrains Mono',monospace}
.modal-close{background:none;border:none;color:#888;cursor:pointer;padding:4px;border-radius:8px;display:flex}
.modal-close:hover{color:#fff}
.modal-body{padding:20px 24px 24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.field{margin-bottom:16px}
.field-label{display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.color-row{display:flex;gap:10px;align-items:center}
.color-picker{width:44px;height:40px;border:none;border-radius:8px;cursor:pointer;background:transparent}
.checkbox-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.checkbox-row label{font-size:13px;color:#aaa;cursor:pointer}
.textarea{resize:vertical;font-family:'Space Grotesk',sans-serif}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.btn-cancel{padding:10px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#aaa;font-size:14px;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.btn-save{padding:10px 24px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 4px 15px rgba(59,130,246,.3)}

/* ─── Detail ─── */
.detail-top{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.detail-color{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,.15);flex-shrink:0}
.detail-name{font-size:20px;font-weight:700;color:#fff}
.detail-brand{font-size:13px;color:#888}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-cell{background:rgba(255,255,255,.03);border-radius:10px;padding:10px 14px;border:1px solid rgba(255,255,255,.04)}
.detail-cell-label{font-size:10px;color:#666;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.detail-cell-value{font-size:14px;font-weight:600;color:#ddd;margin-top:2px}
.detail-remaining{margin-bottom:20px}
.detail-remaining-header{display:flex;justify-content:space-between;margin-bottom:6px}
.detail-remaining-label{font-size:11px;color:#888;font-family:'JetBrains Mono',monospace;text-transform:uppercase}
.detail-remaining-value{font-size:13px;font-weight:700;color:#ddd;font-family:'JetBrains Mono',monospace}
.detail-bar{height:10px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden}
.detail-bar-fill{height:100%;border-radius:5px;transition:width .5s ease}
.detail-notes{background:rgba(255,255,255,.03);border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,.04);margin-bottom:20px}
.detail-notes-label{font-size:10px;color:#666;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.detail-notes-text{font-size:13px;color:#bbb;line-height:1.5;white-space:pre-wrap}
.detail-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-dup{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#aaa;font-size:13px;cursor:pointer}
.btn-edit{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:10px;color:#3b82f6;font-size:13px;cursor:pointer}
.btn-del{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.1);border-radius:10px;color:#ef4444;font-size:13px;cursor:pointer}
.btn-del-confirm{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);border-radius:10px;color:#ef4444;font-size:13px;font-weight:700;cursor:pointer}

.hidden{display:none!important}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1d23;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 20px;font-size:13px;color:#ccc;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:2000;animation:slideUp .3s ease;font-family:'JetBrains Mono',monospace}

@media(max-width:600px){
  .header{padding:16px}
  .toolbar{padding:12px 16px}
  .content{padding:0 16px 40px}
  .form-grid{grid-template-columns:1fr}
  .stats{gap:10px}
  .stat-card{min-width:auto;flex:1}
  .detail-grid{grid-template-columns:1fr}
  .header-actions{width:100%}
  .btn-add{flex:1;justify-content:center}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     SETUP SCREEN — Firebase config + room code
     ═══════════════════════════════════════════════════ -->
<div id="setupScreen" class="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">
      <svg width="36" height="36" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="#fff" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="8" stroke="#fff" stroke-width="2.5" fill="#fff" fill-opacity=".2"/><circle cx="24" cy="24" r="3" fill="#fff"/><path d="M24 4 Q28 14 24 16 Q20 14 24 4Z" fill="#fff" fill-opacity=".3"/><path d="M44 24 Q34 28 32 24 Q34 20 44 24Z" fill="#fff" fill-opacity=".3"/><path d="M24 44 Q20 34 24 32 Q28 34 24 44Z" fill="#fff" fill-opacity=".3"/><path d="M4 24 Q14 20 16 24 Q14 28 4 24Z" fill="#fff" fill-opacity=".3"/></svg>
    </div>
    <div class="setup-title">Filament</div>
    <div class="setup-sub">Entre ton code de collection pour accéder à tes bobines</div>

    <div class="setup-section">
      <div class="setup-section-title">Code de ta collection</div>
      <p>Choisis un code unique pour ta collection.</p>
      <input class="setup-input" id="setupRoom" placeholder="Ex: mon-stock-3d" maxlength="30" onkeydown="if(event.key==='Enter')connectFirebase()">
    </div>

    <div id="setupError" class="setup-error hidden"></div>
    <button class="setup-btn" onclick="connectFirebase()">C'est parti !</button>

    <div class="setup-or">— ou —</div>
    <button class="setup-btn-secondary" onclick="startOffline()">Utiliser hors-ligne uniquement</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     MAIN APP
     ═══════════════════════════════════════════════════ -->
<div id="appScreen" class="hidden">
  <header class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="logo-area">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="#fff" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="8" stroke="#fff" stroke-width="2.5" fill="#fff" fill-opacity=".2"/><circle cx="24" cy="24" r="3" fill="#fff"/><path d="M24 4 Q28 14 24 16 Q20 14 24 4Z" fill="#fff" fill-opacity=".3"/><path d="M44 24 Q34 28 32 24 Q34 20 44 24Z" fill="#fff" fill-opacity=".3"/><path d="M24 44 Q20 34 24 32 Q28 34 24 44Z" fill="#fff" fill-opacity=".3"/><path d="M4 24 Q14 20 16 24 Q14 28 4 24Z" fill="#fff" fill-opacity=".3"/></svg>
          </div>
          <div>
            <div class="logo-title">Filament</div>
            <div class="logo-sub">
              <span>Gestionnaire de bobines 3D</span>
              <div class="sync-bar" id="syncBar">
                <span class="sync-dot sync-online" id="syncDot"></span>
                <span id="syncText">Connecté</span>
              </div>
              <button class="room-badge" id="roomBadge" onclick="showRoomInfo()" title="Code de collection"></button>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <!-- Export -->
          <button class="btn-icon" onclick="exportJSON()" title="Exporter JSON">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 3v10m0 0l-3-3m3 3l3-3M4 15h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <!-- Import -->
          <button class="btn-icon" onclick="document.getElementById('importFile').click()" title="Importer JSON">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 13V3m0 0L7 6m3-3l3 3M4 15h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
          <!-- Déconnexion -->
          <button class="btn-icon" onclick="disconnect()" title="Changer de collection">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M7 7l6 6m0-6l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button class="btn-add" onclick="openAddModal()">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Ajouter
          </button>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <div class="search-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="2"/><path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
      <input class="input input-search" placeholder="Rechercher une bobine..." id="searchInput" oninput="renderSpools()">
    </div>
    <select class="select" id="filterMaterial" onchange="renderSpools()"><option value="Tous">Tous matériaux</option></select>
    <select class="select" id="filterBrand" onchange="renderSpools()"><option value="Toutes">Toutes marques</option></select>
    <select class="select" id="sortBy" onchange="renderSpools()">
      <option value="date">Récent</option><option value="name">Nom</option><option value="remaining">Stock ↑</option><option value="material">Matériau</option><option value="brand">Marque</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="viewGrid" onclick="setView('grid')"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg></button>
      <button class="view-btn" id="viewList" onclick="setView('list')"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <div class="content" id="content"></div>
</div>

          <datalist id="brands-list"><option value="Bambu Lab"><option value="Prusament"><option value="eSUN"><option value="Polymaker"><option value="Sunlu"><option value="Hatchbox"><option value="Overture"><option value="Eryone"><option value="Creality"><option value="FilamentPM"><option value="Elegoo"><option value="Rosa 3D"><option value="Anycubic"><option value="Cailab"></datalist>
        </div>
        <div class="field"><label class="field-label">Matériau</label><select class="select input" id="f_material"></select></div>
        <div class="field"><label class="field-label">Diamètre</label><select class="select input" id="f_diameter"><option value="1.75mm">1.75mm</option><option value="2.85mm">2.85mm</option></select></div>
        <div class="field"><label class="field-label">Couleur</label><div class="color-row"><input type="color" class="color-picker" id="f_color" value="#3b82f6"><input class="input" id="f_colorName" placeholder="Nom de la couleur" style="flex:1"></div></div>
        <div class="field"><label class="field-label">Finition</label><select class="select input" id="f_finish"></select></div>
        <div class="field"><label class="field-label">Poids bobine (g)</label><input type="number" class="input" id="f_weight" value="1000"></div>
        <div class="field"><label class="field-label" id="f_remaining_label">Restant : 100%</label><input type="range" min="0" max="100" value="100" id="f_remaining" style="width:100%;margin-top:4px" oninput="document.getElementById('f_remaining_label').textContent='Restant : '+this.value+'%'"></div>
        <div class="field"><label class="field-label">Temp. buse (°C)</label><input class="input" id="f_tempNozzle" placeholder="190-220"></div>
        <div class="field"><label class="field-label">Temp. plateau (°C)</label><input class="input" id="f_tempBed" placeholder="50-70"></div>
        <div class="field"><label class="field-label">Prix (€)</label><input class="input" id="f_price" placeholder="24.99"></div>
        <div class="field"><label class="field-label">Date d'achat</label><input type="date" class="input" id="f_purchaseDate"></div>
      </div>
      <div class="checkbox-row"><input type="checkbox" id="f_opened" style="accent-color:#3b82f6"><label for="f_opened">Bobine ouverte / entamée</label></div>
      <div class="field"><label class="field-label">Notes</label><textarea class="input textarea" id="f_notes" rows="3" placeholder="Remarques, paramètres spéciaux, retour d'expérience..."></textarea></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeFormModal()">Annuler</button>
        <button class="btn-save" id="btnSave" onclick="saveSpool()">Ajouter</button>
      </div>

</div>

<!-- ─── Modal Détails ─── -->
<div class="modal-overlay hidden" id="detailModal" onclick="closeDetailModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Détails de la bobine</h2>
      <button class="modal-close" onclick="closeDetailModal()"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<script>
// ─── Constants ───
const MATERIALS=["PLA","PETG","ABS","ASA","TPU","Nylon","PC","PVA","HIPS","PP","Carbon","Bois","Métal","Autre"];
const FINISHES=["Mat","Brillant","Satiné","Silk","Marble","Galaxy","Glow","Transparent","Autre"];
const BRAND_COLORS={"Bambu Lab":"#00ae42","Prusament":"#fa6831","eSUN":"#0074d9","Polymaker":"#e74c3c","Sunlu":"#f39c12","Hatchbox":"#8e44ad","Overture":"#2ecc71","Eryone":"#e67e22","Creality":"#3498db","FilamentPM":"#1abc9c"};

// ─── State ───
let spools = [];
let viewMode = 'grid';
let editingId = null;
let deleteConfirmId = null;
const FIREBASE_URL = 'https://gestion-de-filament-default-rtdb.firebaseio.com';
let dbUrl = FIREBASE_URL;
let roomCode = null;
let isOnline = false;
let eventSource = null;

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

// ─── Init selects ───
(function(){
  const m=document.getElementById('f_material');
  MATERIALS.forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;m.appendChild(o)});
  const f=document.getElementById('f_finish');
  FINISHES.forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;f.appendChild(o)});
})();

// ─── Toast ───
function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

// ═══════════════════════════════════════════════════
//  FIREBASE / STORAGE LAYER
// ═══════════════════════════════════════════════════

function getFirebasePath(){
  return dbUrl.replace(/\/$/,'') + '/filament-vault/' + encodeURIComponent(roomCode) + '.json';
}

async function fbSave(){
  if(!isOnline)return localSave();
  try{
    await fetch(getFirebasePath(),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(spools)});
  }catch(e){console.error('Firebase save error',e);localSave();}
  localSave(); // always keep local backup
}

async function fbLoad(){
  try{
    const r=await fetch(getFirebasePath());
    if(r.ok){const d=await r.json();if(Array.isArray(d))return d;}
  }catch(e){console.error('Firebase load error',e);}
  return null;
}

function fbListen(){
  // Use SSE for real-time sync
  if(eventSource)eventSource.close();
  try{
    const url=getFirebasePath().replace('.json','')+'.json?auth=';
    // Firebase REST streaming
    eventSource=new EventSource(dbUrl.replace(/\/$/,'')+'/filament-vault/'+encodeURIComponent(roomCode)+'.json');
    eventSource.onopen=()=>{setSyncStatus(true)};
    eventSource.addEventListener('put',e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.data && Array.isArray(d.data)){spools=d.data;localSave();renderSpools();}
        else if(d.path==='/' && d.data===null){spools=[];localSave();renderSpools();}
      }catch(ex){}
    });
    eventSource.addEventListener('patch',e=>{
      fbLoad().then(d=>{if(d){spools=d;localSave();renderSpools();}});
    });
    eventSource.onerror=()=>{setSyncStatus(false)};
  }catch(e){console.error('SSE error',e)}
}

function localSave(){localStorage.setItem('fv-spools-'+roomCode,JSON.stringify(spools))}
function localLoad(){try{return JSON.parse(localStorage.getItem('fv-spools-'+roomCode)||'[]')}catch(e){return[]}}

function setSyncStatus(online){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncText');
  if(online){dot.className='sync-dot sync-online';txt.textContent='Synchro OK';}
  else{dot.className='sync-dot sync-offline';txt.textContent='Hors-ligne';}
}

// ═══════════════════════════════════════════════════
//  SETUP / CONNECTION
// ═══════════════════════════════════════════════════

async function connectFirebase(){
  const room=document.getElementById('setupRoom').value.trim().toLowerCase().replace(/[^a-z0-9\-_]/g,'');
  const errEl=document.getElementById('setupError');
  if(!room||room.length<2){errEl.textContent="Code collection trop court (min. 2 caractères)";errEl.classList.remove('hidden');return}
  errEl.classList.add('hidden');

  dbUrl=FIREBASE_URL;roomCode=room;isOnline=true;
  localStorage.setItem('fv-config',JSON.stringify({roomCode}));

  // Load from Firebase first, fallback to local
  const remote=await fbLoad();
  if(remote){spools=remote;localSave();}else{spools=localLoad();}

  enterApp();
  fbListen();
}

function startOffline(){
  roomCode=prompt("Choisis un nom pour ta collection :","mon-stock") || 'default';
  roomCode=roomCode.trim().toLowerCase().replace(/[^a-z0-9\-_]/g,'') || 'default';
  isOnline=false;
  localStorage.setItem('fv-config',JSON.stringify({roomCode,offline:true}));
  spools=localLoad();
  enterApp();
  setSyncStatus(false);
  document.getElementById('syncText').textContent='Local';
}

function disconnect(){
  if(eventSource)eventSource.close();
  localStorage.removeItem('fv-config');
  document.getElementById('appScreen').classList.add('hidden');
  document.getElementById('setupScreen').classList.remove('hidden');
}

function enterApp(){
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('roomBadge').textContent='# '+roomCode;
  renderSpools();
}

// Auto-reconnect on load
(function autoConnect(){
  try{
    const cfg=JSON.parse(localStorage.getItem('fv-config'));
    if(cfg && cfg.roomCode){
      roomCode=cfg.roomCode;
      spools=localLoad();
      if(cfg.offline){
        isOnline=false;dbUrl=null;
        enterApp();
        setSyncStatus(false);document.getElementById('syncText').textContent='Local';
      }else{
        dbUrl=FIREBASE_URL;isOnline=true;
        enterApp();
        fbLoad().then(d=>{if(d){spools=d;localSave();renderSpools();}});fbListen();
      }
    }
  }catch(e){}
})();

function showRoomInfo(){
  toast('Collection : '+roomCode+(isOnline?' (synchro Firebase)':' (local)'));
}

// ═══════════════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════════════

function exportJSON(){
  const blob=new Blob([JSON.stringify(spools,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='filament-vault-'+roomCode+'.json';a.click();
  toast('Export terminé !');
}

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data)){toast('Format invalide');return}
      if(confirm(`Importer ${data.length} bobine(s) ? Cela remplacera la collection actuelle.`)){
        spools=data;fbSave();renderSpools();toast(data.length+' bobines importées !');
      }
    }catch(ex){toast('Erreur de lecture du fichier')}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ═══════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════

function gaugeSVG(pct,color,size=52){
  const r=(size-8)/2,circ=2*Math.PI*r,offset=circ*(1-pct/100);
  const gc=pct<15?'#ef4444':pct<40?'#f59e0b':color;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${gc}" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/></svg>`;
}

function renderSpools(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const matF=document.getElementById('filterMaterial').value;
  const braF=document.getElementById('filterBrand').value;
  const sort=document.getElementById('sortBy').value;

  // Update filters
  const brands=[...new Set(spools.map(s=>s.brand).filter(Boolean))].sort();
  const brandSel=document.getElementById('filterBrand');
  const curB=brandSel.value;
  brandSel.innerHTML='<option value="Toutes">Toutes marques</option>'+brands.map(b=>`<option value="${esc(b)}"${b===curB?' selected':''}>${esc(b)}</option>`).join('');

  const matSel=document.getElementById('filterMaterial');
  const curM=matSel.value;
  matSel.innerHTML='<option value="Tous">Tous matériaux</option>'+MATERIALS.map(m=>`<option value="${m}"${m===curM?' selected':''}>${m}</option>`).join('');

  let filtered=spools.filter(s=>{
    const ms=!q||s.name.toLowerCase().includes(q)||s.brand.toLowerCase().includes(q)||(s.colorName||'').toLowerCase().includes(q)||s.material.toLowerCase().includes(q);
    const mm=matF==='Tous'||s.material===matF;
    const mb=braF==='Toutes'||s.brand===braF;
    return ms&&mm&&mb;
  });
  filtered.sort((a,b)=>{
    if(sort==='name')return(a.name||a.brand).localeCompare(b.name||b.brand);
    if(sort==='remaining')return a.remaining-b.remaining;
    if(sort==='material')return a.material.localeCompare(b.material);
    if(sort==='brand')return(a.brand||'').localeCompare(b.brand||'');
    return 0;
  });

  // Stats
  const totalW=spools.reduce((a,s)=>a+(s.weight*s.remaining/100),0);
  const low=spools.filter(s=>s.remaining<20).length;
  const mats=[...new Set(spools.map(s=>s.material))].length;
  document.getElementById('stats').innerHTML=[
    {l:'Bobines',v:spools.length,c:'#3b82f6'},
    {l:'Stock restant',v:(totalW/1000).toFixed(1)+' kg',c:'#10b981'},
    {l:'Stock faible',v:low,c:low>0?'#ef4444':'#666'},
    {l:'Matériaux',v:mats,c:'#8b5cf6'}
  ].map(s=>`<div class="stat-card"><div class="stat-label">${s.l}</div><div class="stat-value" style="color:${s.c}">${s.v}</div></div>`).join('');

  const content=document.getElementById('content');
  if(filtered.length===0){
    content.innerHTML=`<div class="empty"><svg width="64" height="64" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="#333" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="8" stroke="#333" stroke-width="2.5" fill="#333" fill-opacity=".2"/><circle cx="24" cy="24" r="3" fill="#333"/></svg><p>${spools.length===0?'Aucune bobine enregistrée':'Aucun résultat'}</p>${spools.length===0?'<p class="sub">Cliquez sur "Ajouter" pour commencer</p>':''}</div>`;
    return;
  }

  if(viewMode==='grid'){
    content.innerHTML='<div class="grid">'+filtered.map((s,i)=>{
      const bc=BRAND_COLORS[s.brand]||'#888';
      return `<div class="card" style="animation:slideUp .3s ease ${i*.03}s both" onclick="openDetail('${s.id}')" onmouseenter="this.style.borderColor='${s.color}44';this.style.boxShadow='0 8px 30px ${s.color}15'" onmouseleave="this.style.borderColor='rgba(255,255,255,0.05)';this.style.boxShadow='none'">
        <div class="card-bar" style="background:linear-gradient(90deg,${s.color},${s.color}88)"></div>
        <div class="card-body"><div class="card-header"><div class="card-info">
          <div class="card-name-row"><div class="color-dot" style="width:22px;height:22px;background:${s.color};box-shadow:0 0 10px ${s.color}44"></div>
          <span class="card-name">${esc(s.name||s.colorName||'Sans nom')}</span></div>
          <div class="card-meta">${s.brand?`<span style="color:${bc}">${esc(s.brand)}</span> · `:''}${s.material} · ${s.diameter}</div>
        </div><div class="gauge-wrap">${gaugeSVG(s.remaining,s.color)}<div class="gauge-label">${Math.round(s.weight*s.remaining/100)}g</div></div></div>
        <div class="tags">
          <span class="tag" style="background:${s.color}15;color:${s.color}">${s.material}</span>
          ${s.finish!=='Mat'?`<span class="tag" style="background:rgba(255,255,255,.04);color:#888">${s.finish}</span>`:''}
          ${s.opened?'<span class="tag" style="background:rgba(245,158,11,.1);color:#f59e0b">Ouverte</span>':''}
          ${s.weight?`<span class="tag" style="background:rgba(255,255,255,.04);color:#888">${Math.round(s.weight*s.remaining/100)}/${s.weight}g</span>`:''}
        </div></div></div>`;
    }).join('')+'</div>';
  }else{
    content.innerHTML='<div class="list">'+filtered.map((s,i)=>{
      const barColor=s.remaining<15?'#ef4444':s.remaining<40?'#f59e0b':s.color;
      return `<div class="list-row" style="animation:slideUp .3s ease ${i*.02}s both" onclick="openDetail('${s.id}')">
        <div class="color-dot" style="width:16px;height:16px;background:${s.color}"></div>
        <div class="list-name"><span>${esc(s.name||s.colorName||'Sans nom')}</span><span>${esc(s.brand)}</span></div>
        <span class="list-mat" style="background:${s.color}15;color:${s.color}">${s.material}</span>
        <span class="list-dia">${s.diameter}</span>
        <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${s.remaining}%;background:${barColor}"></div></div><span class="progress-pct">${Math.round(s.weight*s.remaining/100)}g</span></div>
      </div>`;
    }).join('')+'</div>';
  }
}

function setView(m){viewMode=m;document.getElementById('viewGrid').className='view-btn'+(m==='grid'?' active':'');document.getElementById('viewList').className='view-btn'+(m==='list'?' active':'');renderSpools()}

// ═══════════════════════════════════════════════════
//  FORM MODAL
// ═══════════════════════════════════════════════════

function openAddModal(){editingId=null;document.getElementById('formModalTitle').textContent='Nouvelle bobine';document.getElementById('btnSave').textContent='Ajouter';resetForm();document.getElementById('formModal').classList.remove('hidden')}

function openEditModal(id){
  const s=spools.find(x=>x.id===id);if(!s)return;
  editingId=id;
  document.getElementById('formModalTitle').textContent='Modifier la bobine';
  document.getElementById('btnSave').textContent='Enregistrer';
  document.getElementById('f_name').value=s.name;
  document.getElementById('f_brand').value=s.brand;
  document.getElementById('f_material').value=s.material;
  document.getElementById('f_diameter').value=s.diameter;
  document.getElementById('f_color').value=s.color;
  document.getElementById('f_colorName').value=s.colorName;
  document.getElementById('f_finish').value=s.finish;
  document.getElementById('f_weight').value=s.weight;
  document.getElementById('f_remaining').value=s.remaining;
  document.getElementById('f_remaining_label').textContent='Restant : '+s.remaining+'%';
  document.getElementById('f_tempNozzle').value=s.tempNozzle;
  document.getElementById('f_tempBed').value=s.tempBed;
  document.getElementById('f_price').value=s.price;
  document.getElementById('f_purchaseDate').value=s.purchaseDate;
  document.getElementById('f_opened').checked=s.opened;
  document.getElementById('f_notes').value=s.notes;
  document.getElementById('formModal').classList.remove('hidden');
}

function closeFormModal(){document.getElementById('formModal').classList.add('hidden');editingId=null}

function resetForm(){
  ['f_name','f_brand','f_colorName','f_tempNozzle','f_tempBed','f_price','f_purchaseDate','f_notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_material').value='PLA';document.getElementById('f_diameter').value='1.75mm';
  document.getElementById('f_color').value='#3b82f6';document.getElementById('f_finish').value='Mat';
  document.getElementById('f_weight').value=1000;document.getElementById('f_remaining').value=100;
  document.getElementById('f_remaining_label').textContent='Restant : 100%';
  document.getElementById('f_opened').checked=false;
}

function saveSpool(){
  const name=document.getElementById('f_name').value.trim();
  const brand=document.getElementById('f_brand').value.trim();
  if(!name&&!brand)return;
  const data={id:editingId||genId(),name,brand,
    material:document.getElementById('f_material').value,
    color:document.getElementById('f_color').value,
    colorName:document.getElementById('f_colorName').value.trim(),
    diameter:document.getElementById('f_diameter').value,
    weight:Number(document.getElementById('f_weight').value)||1000,
    remaining:Number(document.getElementById('f_remaining').value),
    finish:document.getElementById('f_finish').value,
    tempNozzle:document.getElementById('f_tempNozzle').value.trim(),
    tempBed:document.getElementById('f_tempBed').value.trim(),
    price:document.getElementById('f_price').value.trim(),
    purchaseDate:document.getElementById('f_purchaseDate').value,
    opened:document.getElementById('f_opened').checked,
    notes:document.getElementById('f_notes').value.trim()};
  if(editingId){spools=spools.map(s=>s.id===editingId?data:s)}else{spools.unshift(data)}
  fbSave();closeFormModal();renderSpools();
}

// ═══════════════════════════════════════════════════
//  DETAIL MODAL
// ═══════════════════════════════════════════════════

function openDetail(id){
  const s=spools.find(x=>x.id===id);if(!s)return;
  deleteConfirmId=null;
  const bc=BRAND_COLORS[s.brand]||'#aaa';
  const barColor=s.remaining<15?'#ef4444':s.remaining<40?'#f59e0b':`linear-gradient(90deg,${s.color},${s.color}cc)`;
  const details=[{l:'Matériau',v:s.material},{l:'Diamètre',v:s.diameter},{l:'Poids',v:s.weight+'g'},{l:'Finition',v:s.finish},{l:'Temp. buse',v:s.tempNozzle?s.tempNozzle+'°C':'—'},{l:'Temp. plateau',v:s.tempBed?s.tempBed+'°C':'—'},{l:'Prix',v:s.price?s.price+' €':'—'},{l:'Achat',v:s.purchaseDate||'—'}];
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-top"><div class="detail-color" style="background:${s.color};box-shadow:0 0 25px ${s.color}44"></div>
    <div><div class="detail-name">${esc(s.name||s.colorName||'Sans nom')}</div>
    <div class="detail-brand">${s.brand?`<span style="color:${bc}">${esc(s.brand)}</span> · `:''}${esc(s.colorName)}</div></div></div>
    <div class="detail-grid">${details.map(d=>`<div class="detail-cell"><div class="detail-cell-label">${d.l}</div><div class="detail-cell-value">${esc(d.v)}</div></div>`).join('')}</div>
    <div class="detail-remaining"><div class="detail-remaining-header"><span class="detail-remaining-label">Restant</span><span class="detail-remaining-value">${s.remaining}% — ${Math.round(s.weight*s.remaining/100)}g</span></div><div class="detail-bar"><div class="detail-bar-fill" style="width:${s.remaining}%;background:${barColor}"></div></div></div>
    ${s.notes?`<div class="detail-notes"><div class="detail-notes-label">Notes</div><div class="detail-notes-text">${esc(s.notes)}</div></div>`:''}
    <div class="detail-actions">
      <button class="btn-dup" onclick="dupSpool('${s.id}')"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="5" y="5" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 13V5a3 3 0 013-3h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Dupliquer</button>
      <button class="btn-edit" onclick="closeDetailModal();openEditModal('${s.id}')"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M13.586 3.586a2 2 0 112.828 2.828l-9.9 9.9-3.535.707.707-3.535 9.9-9.9z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Modifier</button>
      <button class="btn-del" id="delBtn" onclick="confirmDelete('${s.id}')"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M3 6h14M8 6V4a1 1 0 011-1h2a1 1 0 011 1v2m2 0v10a2 2 0 01-2 2H8a2 2 0 01-2-2V6h10z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Supprimer</button>
    </div>`;
  document.getElementById('detailModal').classList.remove('hidden');
}

function closeDetailModal(){document.getElementById('detailModal').classList.add('hidden');deleteConfirmId=null}

function confirmDelete(id){
  if(deleteConfirmId===id){spools=spools.filter(s=>s.id!==id);fbSave();closeDetailModal();renderSpools()}
  else{deleteConfirmId=id;const b=document.getElementById('delBtn');b.className='btn-del-confirm';b.innerHTML='Confirmer la suppression'}
}

function dupSpool(id){
  const s=spools.find(x=>x.id===id);if(!s)return;
  spools.unshift({...s,id:genId(),name:s.name+' (copie)'});fbSave();renderSpools();toast('Bobine dupliquée !');
}
</script>
</body>
</html>
