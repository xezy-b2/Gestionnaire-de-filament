<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionnaire de bobines 3D</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><circle cx='24' cy='24' r='20' stroke='%233b82f6' stroke-width='3' fill='none'/><circle cx='24' cy='24' r='8' stroke='%233b82f6' stroke-width='2.5' fill='%233b82f6' fill-opacity='0.2'/><circle cx='24' cy='24' r='3' fill='%233b82f6'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
body{min-height:100vh;background:#0e1015;color:#e0e0e0;font-family:'Space Grotesk','Segoe UI',sans-serif}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ─── Header ─── */
.header{background:linear-gradient(135deg,#12141a,#1a1d25);border-bottom:1px solid rgba(255,255,255,0.05);padding:24px 32px}
.header-inner{max-width:1400px;margin:0 auto}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-icon{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:14px;padding:10px;display:flex}
.logo-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;font-family:'JetBrains Mono',monospace;background:linear-gradient(90deg,#fff,#aaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:12px;color:#666;font-family:'JetBrains Mono',monospace}
.btn-add{display:flex;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 4px 15px rgba(59,130,246,0.3);transition:transform .15s,box-shadow .15s}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.4)}

/* ─── Stats ─── */
.stats{display:flex;gap:24px;margin-top:20px;flex-wrap:wrap}
.stat-card{background:rgba(255,255,255,0.03);border-radius:12px;padding:12px 20px;border:1px solid rgba(255,255,255,0.05);min-width:120}
.stat-label{font-size:11px;color:#666;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.05em}
.stat-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px}

/* ─── Toolbar ─── */
.toolbar{max-width:1400px;margin:0 auto;padding:20px 32px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1 1 250px;max-width:350px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;display:flex}
.input{width:100%;padding:10px 14px;background:#12141a;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#eee;font-size:14px;outline:none;font-family:'Space Mono',monospace;transition:border-color .2s}
.input:focus,.select:focus,.textarea:focus{border-color:#3b82f6!important}
.input-search{padding-left:38px;background:#14161c}
.select{padding:10px 14px;background:#14161c;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#eee;font-size:14px;outline:none;font-family:'Space Mono',monospace;appearance:none;cursor:pointer;min-width:130px}
.view-toggle{display:flex;gap:4px;background:#14161c;border-radius:10px;padding:3px;border:1px solid rgba(255,255,255,0.06)}
.view-btn{background:transparent;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;color:#666;display:flex}
.view-btn.active{background:rgba(59,130,246,0.2);color:#3b82f6}

/* ─── Grid ─── */
.content{max-width:1400px;margin:0 auto;padding:0 32px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:#14161c;border-radius:16px;border:1px solid rgba(255,255,255,0.05);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s}
.card:hover{transform:translateY(-3px)}
.card-bar{height:5px}
.card-body{padding:18px 20px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start}
.card-info{flex:1;min-width:0}
.card-name-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.color-dot{border-radius:50%;border:2px solid rgba(255,255,255,0.15);flex-shrink:0}
.card-name{font-size:15px;font-weight:600;color:#eee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{font-size:12px;color:#777;font-family:'JetBrains Mono',monospace}
.gauge-wrap{position:relative;flex-shrink:0}
.gauge-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#ccc;font-family:'JetBrains Mono',monospace}
.tags{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;font-family:'JetBrains Mono',monospace;text-transform:uppercase}

/* ─── List ─── */
.list{display:flex;flex-direction:column;gap:6px}
.list-row{display:flex;align-items:center;gap:16px;background:#14161c;border-radius:12px;padding:12px 20px;border:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background .15s}
.list-row:hover{background:#1a1d25}
.list-name{flex:1;min-width:0}
.list-name span:first-child{font-weight:600;color:#eee;font-size:14px}
.list-name span:last-child{color:#555;margin-left:8px;font-size:12px}
.list-mat{font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600;font-family:'JetBrains Mono',monospace}
.list-dia{color:#666;font-size:12px;font-family:'JetBrains Mono',monospace;min-width:55px;text-align:right}
.progress-wrap{display:flex;align-items:center;gap:8px;min-width:80px;justify-content:flex-end}
.progress-bar{width:60px;height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.progress-pct{font-size:11px;font-weight:700;color:#999;font-family:'JetBrains Mono',monospace;min-width:30px}

/* ─── Empty ─── */
.empty{text-align:center;padding:80px 20px;color:#444}
.empty p{margin-top:16px;font-size:16px;font-family:'JetBrains Mono',monospace}
.empty .sub{font-size:13px;color:#555;margin-top:4px}

/* ─── Modal ─── */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:#1a1d23;border-radius:16px;width:100%;max-width:560px;max-height:85vh;overflow:auto;border:1px solid rgba(255,255,255,0.08);box-shadow:0 25px 60px rgba(0,0,0,0.5);animation:slideUp .3s ease}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.06)}
.modal-title{font-size:18px;font-weight:700;color:#f0f0f0;font-family:'JetBrains Mono',monospace}
.modal-close{background:none;border:none;color:#888;cursor:pointer;padding:4px;border-radius:8px;display:flex}
.modal-close:hover{color:#fff}
.modal-body{padding:20px 24px 24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.field{margin-bottom:16px}
.field-label{display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.color-row{display:flex;gap:10px;align-items:center}
.color-picker{width:44px;height:40px;border:none;border-radius:8px;cursor:pointer;background:transparent}
.checkbox-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.checkbox-row label{font-size:13px;color:#aaa;cursor:pointer}
.textarea{resize:vertical;font-family:'Space Grotesk',sans-serif}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.btn-cancel{padding:10px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#aaa;font-size:14px;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.btn-save{padding:10px 24px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 4px 15px rgba(59,130,246,0.3)}

/* ─── Detail modal ─── */
.detail-top{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.detail-color{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,0.15);flex-shrink:0}
.detail-name{font-size:20px;font-weight:700;color:#fff}
.detail-brand{font-size:13px;color:#888}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-cell{background:rgba(255,255,255,0.03);border-radius:10px;padding:10px 14px;border:1px solid rgba(255,255,255,0.04)}
.detail-cell-label{font-size:10px;color:#666;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.05em}
.detail-cell-value{font-size:14px;font-weight:600;color:#ddd;margin-top:2px}
.detail-remaining{margin-bottom:20px}
.detail-remaining-header{display:flex;justify-content:space-between;margin-bottom:6px}
.detail-remaining-label{font-size:11px;color:#888;font-family:'JetBrains Mono',monospace;text-transform:uppercase}
.detail-remaining-value{font-size:13px;font-weight:700;color:#ddd;font-family:'JetBrains Mono',monospace}
.detail-bar{height:10px;border-radius:5px;background:rgba(255,255,255,0.06);overflow:hidden}
.detail-bar-fill{height:100%;border-radius:5px;transition:width .5s ease}
.detail-notes{background:rgba(255,255,255,0.03);border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,0.04);margin-bottom:20px}
.detail-notes-label{font-size:10px;color:#666;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.detail-notes-text{font-size:13px;color:#bbb;line-height:1.5;white-space:pre-wrap}
.detail-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-dup{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#aaa;font-size:13px;cursor:pointer}
.btn-edit{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:10px;color:#3b82f6;font-size:13px;cursor:pointer}
.btn-del{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.1);border-radius:10px;color:#ef4444;font-size:13px;cursor:pointer}
.btn-del-confirm{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);border-radius:10px;color:#ef4444;font-size:13px;font-weight:700;cursor:pointer}

.hidden{display:none!important}

@media(max-width:600px){
  .header{padding:16px}
  .toolbar{padding:12px 16px}
  .content{padding:0 16px 40px}
  .form-grid{grid-template-columns:1fr}
  .stats{gap:10px}
  .stat-card{min-width:auto;flex:1}
  .detail-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ─── Header ─── -->
<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-area">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="#fff" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="8" stroke="#fff" stroke-width="2.5" fill="#fff" fill-opacity="0.2"/><circle cx="24" cy="24" r="3" fill="#fff"/><path d="M24 4 Q28 14 24 16 Q20 14 24 4Z" fill="#fff" fill-opacity="0.3"/><path d="M44 24 Q34 28 32 24 Q34 20 44 24Z" fill="#fff" fill-opacity="0.3"/><path d="M24 44 Q20 34 24 32 Q28 34 24 44Z" fill="#fff" fill-opacity="0.3"/><path d="M4 24 Q14 20 16 24 Q14 28 4 24Z" fill="#fff" fill-opacity="0.3"/></svg>
        </div>
        <div>
          <div class="logo-title">Filament</div>
          <div class="logo-sub">Gestionnaire de bobines 3D</div>
        </div>
      </div>
      <button class="btn-add" onclick="openAddModal()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Ajouter une bobine
      </button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</header>

<!-- ─── Toolbar ─── -->
<div class="toolbar">
  <div class="search-wrap">
    <div class="search-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="2"/><path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
    <input class="input input-search" placeholder="Rechercher une bobine..." id="searchInput" oninput="render()">
  </div>
  <select class="select" id="filterMaterial" onchange="render()"><option value="Tous">Tous matériaux</option></select>
  <select class="select" id="filterBrand" onchange="render()"><option value="Toutes">Toutes marques</option></select>
  <select class="select" id="sortBy" onchange="render()">
    <option value="date">Récent</option>
    <option value="name">Nom</option>
    <option value="remaining">Stock ↑</option>
    <option value="material">Matériau</option>
    <option value="brand">Marque</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" id="viewGrid" onclick="setView('grid')"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg></button>
    <button class="view-btn" id="viewList" onclick="setView('list')"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
  </div>
</div>

<!-- ─── Contenu ─── -->
<div class="content" id="content"></div>

<!-- ─── Modal Ajout/Édition ─── -->
<div class="modal-overlay hidden" id="formModal" onclick="closeFormModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title" id="formModalTitle">Nouvelle bobine</h2>
      <button class="modal-close" onclick="closeFormModal()"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label class="field-label">Nom du filament</label><input class="input" id="f_name" placeholder="Ex: Galaxy Black"></div>
        <div class="field"><label class="field-label">Marque</label><input class="input" id="f_brand" placeholder="Ex: Bambu Lab" list="brands-list">
          <datalist id="brands-list"><option value="Bambu Lab"><option value="Prusament"><option value="eSUN"><option value="Polymaker"><option value="Sunlu"><option value="Hatchbox"><option value="Overture"><option value="Eryone"><option value="Creality"><option value="FilamentPM"></datalist>
        </div>
        <div class="field"><label class="field-label">Matériau</label><select class="select input" id="f_material"></select></div>
        <div class="field"><label class="field-label">Diamètre</label><select class="select input" id="f_diameter"><option value="1.75mm">1.75mm</option><option value="2.85mm">2.85mm</option></select></div>
        <div class="field"><label class="field-label">Couleur</label><div class="color-row"><input type="color" class="color-picker" id="f_color" value="#3b82f6"><input class="input" id="f_colorName" placeholder="Nom de la couleur" style="flex:1"></div></div>
        <div class="field"><label class="field-label">Finition</label><select class="select input" id="f_finish"></select></div>
        <div class="field"><label class="field-label">Poids bobine (g)</label><input type="number" class="input" id="f_weight" value="1000"></div>
        <div class="field"><label class="field-label" id="f_remaining_label">Restant : 100%</label><input type="range" min="0" max="100" value="100" id="f_remaining" style="width:100%;margin-top:4px" oninput="document.getElementById('f_remaining_label').textContent='Restant : '+this.value+'%';this.style.accentColor=document.getElementById('f_color').value"></div>
        <div class="field"><label class="field-label">Temp. buse (°C)</label><input class="input" id="f_tempNozzle" placeholder="190-220"></div>
        <div class="field"><label class="field-label">Temp. plateau (°C)</label><input class="input" id="f_tempBed" placeholder="50-70"></div>
        <div class="field"><label class="field-label">Prix (€)</label><input class="input" id="f_price" placeholder="24.99"></div>
        <div class="field"><label class="field-label">Date d'achat</label><input type="date" class="input" id="f_purchaseDate"></div>
      </div>
      <div class="checkbox-row"><input type="checkbox" id="f_opened" style="accent-color:#3b82f6"><label for="f_opened">Bobine ouverte / entamée</label></div>
      <div class="field"><label class="field-label">Notes</label><textarea class="input textarea" id="f_notes" rows="3" placeholder="Remarques, paramètres spéciaux, retour d'expérience..."></textarea></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeFormModal()">Annuler</button>
        <button class="btn-save" onclick="saveSpool()">Ajouter</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── Modal Détails ─── -->
<div class="modal-overlay hidden" id="detailModal" onclick="closeDetailModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Détails de la bobine</h2>
      <button class="modal-close" onclick="closeDetailModal()"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<script>
// ─── Data ───
const MATERIALS = ["PLA","PETG","ABS","ASA","TPU","Nylon","PC","PVA","HIPS","PP","Carbon","Bois","Métal","Autre"];
const FINISHES = ["Mat","Brillant","Satiné","Silk","Marble","Galaxy","Glow","Transparent","Autre"];
const BRAND_COLORS = {"Bambu Lab":"#00ae42","Prusament":"#fa6831","eSUN":"#0074d9","Polymaker":"#e74c3c","Sunlu":"#f39c12","Hatchbox":"#8e44ad","Overture":"#2ecc71","Eryone":"#e67e22","Creality":"#3498db","FilamentPM":"#1abc9c"};

let spools = JSON.parse(localStorage.getItem('filament-spools') || '[]');
let viewMode = 'grid';
let editingId = null;
let deleteConfirmId = null;

function save() { localStorage.setItem('filament-spools', JSON.stringify(spools)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ─── Init selects ───
(function initSelects() {
  const matSel = document.getElementById('f_material');
  MATERIALS.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; matSel.appendChild(o); });
  const finSel = document.getElementById('f_finish');
  FINISHES.forEach(f => { const o = document.createElement('option'); o.value = f; o.textContent = f; finSel.appendChild(o); });
})();

// ─── Gauge SVG ───
function gaugeSVG(pct, color, size = 52) {
  const r = (size - 8) / 2, circ = 2 * Math.PI * r, offset = circ * (1 - pct / 100);
  const gc = pct < 15 ? '#ef4444' : pct < 40 ? '#f59e0b' : color;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="5"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${gc}" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/></svg>`;
}

// ─── Render ───
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const matF = document.getElementById('filterMaterial').value;
  const braF = document.getElementById('filterBrand').value;
  const sort = document.getElementById('sortBy').value;

  // Update brand filter
  const brandSel = document.getElementById('filterBrand');
  const curBrand = brandSel.value;
  const brands = [...new Set(spools.map(s => s.brand).filter(Boolean))].sort();
  brandSel.innerHTML = '<option value="Toutes">Toutes marques</option>' + brands.map(b => `<option value="${esc(b)}"${b===curBrand?' selected':''}>${esc(b)}</option>`).join('');

  // Update material filter
  const matSelF = document.getElementById('filterMaterial');
  const curMat = matSelF.value;
  matSelF.innerHTML = '<option value="Tous">Tous matériaux</option>' + MATERIALS.map(m => `<option value="${m}"${m===curMat?' selected':''}>${m}</option>`).join('');

  let filtered = spools.filter(s => {
    const ms = !q || s.name.toLowerCase().includes(q) || s.brand.toLowerCase().includes(q) || (s.colorName||'').toLowerCase().includes(q) || s.material.toLowerCase().includes(q);
    const mm = matF === 'Tous' || s.material === matF;
    const mb = braF === 'Toutes' || s.brand === braF;
    return ms && mm && mb;
  });

  filtered.sort((a, b) => {
    if (sort === 'name') return (a.name || a.brand).localeCompare(b.name || b.brand);
    if (sort === 'remaining') return a.remaining - b.remaining;
    if (sort === 'material') return a.material.localeCompare(b.material);
    if (sort === 'brand') return (a.brand||'').localeCompare(b.brand||'');
    return 0;
  });

  // Stats
  const totalW = spools.reduce((a, s) => a + (s.weight * s.remaining / 100), 0);
  const lowStock = spools.filter(s => s.remaining < 20).length;
  const mats = [...new Set(spools.map(s => s.material))].length;
  document.getElementById('stats').innerHTML = [
    { l: 'Bobines', v: spools.length, c: '#3b82f6' },
    { l: 'Stock restant', v: (totalW/1000).toFixed(1)+' kg', c: '#10b981' },
    { l: 'Stock faible', v: lowStock, c: lowStock > 0 ? '#ef4444' : '#666' },
    { l: 'Matériaux', v: mats, c: '#8b5cf6' }
  ].map(s => `<div class="stat-card"><div class="stat-label">${s.l}</div><div class="stat-value" style="color:${s.c}">${s.v}</div></div>`).join('');

  // Content
  const content = document.getElementById('content');
  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty"><svg width="64" height="64" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="#333" stroke-width="3" fill="none"/><circle cx="24" cy="24" r="8" stroke="#333" stroke-width="2.5" fill="#333" fill-opacity="0.2"/><circle cx="24" cy="24" r="3" fill="#333"/></svg><p>${spools.length===0?'Aucune bobine enregistrée':'Aucun résultat'}</p>${spools.length===0?'<p class="sub">Cliquez sur "Ajouter une bobine" pour commencer</p>':''}</div>`;
    return;
  }

  if (viewMode === 'grid') {
    content.innerHTML = '<div class="grid">' + filtered.map((s, i) => {
      const bc = BRAND_COLORS[s.brand] || '#888';
      return `<div class="card" style="animation:slideUp .3s ease ${i*0.03}s both" onclick="openDetail('${s.id}')" onmouseenter="this.style.borderColor='${s.color}44';this.style.boxShadow='0 8px 30px ${s.color}15'" onmouseleave="this.style.borderColor='rgba(255,255,255,0.05)';this.style.boxShadow='none'">
        <div class="card-bar" style="background:linear-gradient(90deg,${s.color},${s.color}88)"></div>
        <div class="card-body"><div class="card-header"><div class="card-info">
          <div class="card-name-row"><div class="color-dot" style="width:22px;height:22px;background:${s.color};box-shadow:0 0 10px ${s.color}44"></div>
          <span class="card-name">${esc(s.name||s.colorName||'Sans nom')}</span></div>
          <div class="card-meta">${s.brand?`<span style="color:${bc}">${esc(s.brand)}</span> · `:''}${s.material} · ${s.diameter}</div>
        </div><div class="gauge-wrap">${gaugeSVG(s.remaining, s.color)}<div class="gauge-label">${s.remaining}%</div></div></div>
        <div class="tags">
          <span class="tag" style="background:${s.color}15;color:${s.color}">${s.material}</span>
          ${s.finish!=='Mat'?`<span class="tag" style="background:rgba(255,255,255,0.04);color:#888">${s.finish}</span>`:''}
          ${s.opened?'<span class="tag" style="background:rgba(245,158,11,0.1);color:#f59e0b">Ouverte</span>':''}
          ${s.weight?`<span class="tag" style="background:rgba(255,255,255,0.04);color:#888">${s.weight}g</span>`:''}
        </div></div></div>`;
    }).join('') + '</div>';
  } else {
    content.innerHTML = '<div class="list">' + filtered.map((s, i) => {
      const barColor = s.remaining < 15 ? '#ef4444' : s.remaining < 40 ? '#f59e0b' : s.color;
      return `<div class="list-row" style="animation:slideUp .3s ease ${i*0.02}s both" onclick="openDetail('${s.id}')">
        <div class="color-dot" style="width:16px;height:16px;background:${s.color}"></div>
        <div class="list-name"><span>${esc(s.name||s.colorName||'Sans nom')}</span><span>${esc(s.brand)}</span></div>
        <span class="list-mat" style="background:${s.color}15;color:${s.color}">${s.material}</span>
        <span class="list-dia">${s.diameter}</span>
        <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${s.remaining}%;background:${barColor}"></div></div><span class="progress-pct">${s.remaining}%</span></div>
      </div>`;
    }).join('') + '</div>';
  }
}

// ─── View toggle ───
function setView(mode) {
  viewMode = mode;
  document.getElementById('viewGrid').className = 'view-btn' + (mode==='grid'?' active':'');
  document.getElementById('viewList').className = 'view-btn' + (mode==='list'?' active':'');
  render();
}

// ─── Form Modal ───
function openAddModal() {
  editingId = null;
  document.getElementById('formModalTitle').textContent = 'Nouvelle bobine';
  document.querySelector('.btn-save').textContent = 'Ajouter';
  resetForm();
  document.getElementById('formModal').classList.remove('hidden');
}

function openEditModal(id) {
  const s = spools.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('formModalTitle').textContent = 'Modifier la bobine';
  document.querySelector('.btn-save').textContent = 'Enregistrer';
  document.getElementById('f_name').value = s.name;
  document.getElementById('f_brand').value = s.brand;
  document.getElementById('f_material').value = s.material;
  document.getElementById('f_diameter').value = s.diameter;
  document.getElementById('f_color').value = s.color;
  document.getElementById('f_colorName').value = s.colorName;
  document.getElementById('f_finish').value = s.finish;
  document.getElementById('f_weight').value = s.weight;
  document.getElementById('f_remaining').value = s.remaining;
  document.getElementById('f_remaining_label').textContent = 'Restant : ' + s.remaining + '%';
  document.getElementById('f_tempNozzle').value = s.tempNozzle;
  document.getElementById('f_tempBed').value = s.tempBed;
  document.getElementById('f_price').value = s.price;
  document.getElementById('f_purchaseDate').value = s.purchaseDate;
  document.getElementById('f_opened').checked = s.opened;
  document.getElementById('f_notes').value = s.notes;
  document.getElementById('formModal').classList.remove('hidden');
}

function closeFormModal() { document.getElementById('formModal').classList.add('hidden'); editingId = null; }

function resetForm() {
  ['f_name','f_brand','f_colorName','f_tempNozzle','f_tempBed','f_price','f_purchaseDate','f_notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_material').value = 'PLA';
  document.getElementById('f_diameter').value = '1.75mm';
  document.getElementById('f_color').value = '#3b82f6';
  document.getElementById('f_finish').value = 'Mat';
  document.getElementById('f_weight').value = 1000;
  document.getElementById('f_remaining').value = 100;
  document.getElementById('f_remaining_label').textContent = 'Restant : 100%';
  document.getElementById('f_opened').checked = false;
}

function saveSpool() {
  const name = document.getElementById('f_name').value.trim();
  const brand = document.getElementById('f_brand').value.trim();
  if (!name && !brand) return;
  const data = {
    id: editingId || genId(),
    name, brand,
    material: document.getElementById('f_material').value,
    color: document.getElementById('f_color').value,
    colorName: document.getElementById('f_colorName').value.trim(),
    diameter: document.getElementById('f_diameter').value,
    weight: Number(document.getElementById('f_weight').value) || 1000,
    remaining: Number(document.getElementById('f_remaining').value),
    finish: document.getElementById('f_finish').value,
    tempNozzle: document.getElementById('f_tempNozzle').value.trim(),
    tempBed: document.getElementById('f_tempBed').value.trim(),
    price: document.getElementById('f_price').value.trim(),
    purchaseDate: document.getElementById('f_purchaseDate').value,
    opened: document.getElementById('f_opened').checked,
    notes: document.getElementById('f_notes').value.trim()
  };
  if (editingId) {
    spools = spools.map(s => s.id === editingId ? data : s);
  } else {
    spools.unshift(data);
  }
  save(); closeFormModal(); render();
}

// ─── Detail Modal ───
function openDetail(id) {
  const s = spools.find(x => x.id === id);
  if (!s) return;
  deleteConfirmId = null;
  const bc = BRAND_COLORS[s.brand] || '#aaa';
  const barColor = s.remaining < 15 ? '#ef4444' : s.remaining < 40 ? '#f59e0b' : `linear-gradient(90deg,${s.color},${s.color}cc)`;
  const details = [
    {l:'Matériau',v:s.material},{l:'Diamètre',v:s.diameter},{l:'Poids',v:s.weight+'g'},{l:'Finition',v:s.finish},
    {l:'Temp. buse',v:s.tempNozzle?s.tempNozzle+'°C':'—'},{l:'Temp. plateau',v:s.tempBed?s.tempBed+'°C':'—'},
    {l:'Prix',v:s.price?s.price+' €':'—'},{l:'Achat',v:s.purchaseDate||'—'}
  ];
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-top">
      <div class="detail-color" style="background:${s.color};box-shadow:0 0 25px ${s.color}44"></div>
      <div><div class="detail-name">${esc(s.name||s.colorName||'Sans nom')}</div>
      <div class="detail-brand">${s.brand?`<span style="color:${bc}">${esc(s.brand)}</span> · `:''}${esc(s.colorName)}</div></div>
    </div>
    <div class="detail-grid">${details.map(d => `<div class="detail-cell"><div class="detail-cell-label">${d.l}</div><div class="detail-cell-value">${esc(d.v)}</div></div>`).join('')}</div>
    <div class="detail-remaining"><div class="detail-remaining-header"><span class="detail-remaining-label">Restant</span><span class="detail-remaining-value">${s.remaining}% — ${Math.round(s.weight*s.remaining/100)}g</span></div><div class="detail-bar"><div class="detail-bar-fill" style="width:${s.remaining}%;background:${barColor}"></div></div></div>
    ${s.notes?`<div class="detail-notes"><div class="detail-notes-label">Notes</div><div class="detail-notes-text">${esc(s.notes)}</div></div>`:''}
    <div class="detail-actions" id="detailActions">
      <button class="btn-dup" onclick="dupSpool('${s.id}')"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="5" y="5" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 13V5a3 3 0 013-3h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Dupliquer</button>
      <button class="btn-edit" onclick="closeDetailModal();openEditModal('${s.id}')"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M13.586 3.586a2 2 0 112.828 2.828l-9.9 9.9-3.535.707.707-3.535 9.9-9.9z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Modifier</button>
      <button class="btn-del" id="delBtn" onclick="confirmDelete('${s.id}')"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M3 6h14M8 6V4a1 1 0 011-1h2a1 1 0 011 1v2m2 0v10a2 2 0 01-2 2H8a2 2 0 01-2-2V6h10z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Supprimer</button>
    </div>`;
  document.getElementById('detailModal').classList.remove('hidden');
}

function closeDetailModal() { document.getElementById('detailModal').classList.add('hidden'); deleteConfirmId = null; }

function confirmDelete(id) {
  if (deleteConfirmId === id) {
    spools = spools.filter(s => s.id !== id);
    save(); closeDetailModal(); render();
  } else {
    deleteConfirmId = id;
    const btn = document.getElementById('delBtn');
    btn.className = 'btn-del-confirm';
    btn.innerHTML = 'Confirmer la suppression';
  }
}

function dupSpool(id) {
  const s = spools.find(x => x.id === id);
  if (!s) return;
  spools.unshift({ ...s, id: genId(), name: s.name + ' (copie)' });
  save(); render();
}

// ─── Export / Import ───
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'e') { // Ctrl+E = export JSON
    e.preventDefault();
    const blob = new Blob([JSON.stringify(spools, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'filament-vault-backup.json'; a.click();
  }
});

// ─── Init ───
render();
</script>
</body>
</html>
